<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یتیم غوره</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d0d0d;
            color: #c0c0c0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #auth-container {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 45px 35px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }

        #auth-container h1 {
            color: #c8a84e;
            margin-bottom: 30px;
            font-size: 26px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            color: #555;
            letter-spacing: 2px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 2px;
            border: 1px solid #1a1a1a;
            background: #0a0a0f;
            color: #c0c0c0;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a3a1a;
        }

        .btn-auth {
            width: 100%;
            padding: 13px;
            border: 1px solid #4a3a1a;
            border-radius: 2px;
            font-size: 13px;
            cursor: pointer;
            background: transparent;
            color: #c8a84e;
            letter-spacing: 4px;
            margin-top: 10px;
            font-family: inherit;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background: rgba(200, 168, 78, 0.05);
            border-color: #c8a84e;
        }

        #msg {
            margin-top: 15px;
            font-size: 12px;
            color: #4a6b3a;
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <h1>یتیم غوره</h1>

        <div id="login-form">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="username" placeholder="نام کاربری">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="password" placeholder="رمز عبور">
            </div>
            <button class="btn-auth" id="enter-btn">ورود</button>
        </div>

        <div id="msg"></div>
    </div>

    <script>
        document.getElementById('enter-btn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                document.getElementById('msg').textContent = 'لطفاً همه فیلدها را پر کنید';
                return;
            }

            document.getElementById('msg').textContent = 'در حال ورود...';

            setTimeout(() => {
                window.location.href = 'list/menu.html';
            }, 500);
        });
    </script>
</body>
</html>
