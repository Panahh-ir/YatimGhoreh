<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یتیم غوره - منو</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media screen and (orientation: portrait) {
            html {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow-x: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d0d0d;
            color: #c0c0c0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(ellipse at center, rgba(30, 30, 30, 0.7) 0%, #0d0d0d 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            background-repeat: repeat;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 6s infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            30% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        #menu-container {
            position: relative;
            z-index: 1;
            width: 95vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: auto auto 1fr auto;
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 15px;
            right: 15px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a3a1a, transparent);
            opacity: 0;
            transition: 0.3s;
        }

        .panel:hover::before {
            opacity: 1;
        }

        .clickable {
            cursor: pointer;
        }

        .clickable:hover {
            border-color: #4a3a1a;
            background: rgba(20, 20, 15, 0.9);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .top-icons {
            grid-column: 1 / 2;
            display: flex;
            gap: 8px;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
        }

        .top-icons::before {
            display: none;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(15, 15, 22, 0.9);
            border: 1px solid #2a2a2a;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .icon-btn:hover {
            border-color: #4a3a1a;
            color: #c8a84e;
        }

        .currency {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .currency i {
            font-size: 16px;
        }

        .gems {
            grid-column: 2 / 3;
            justify-self: center;
            border-color: #3a2a5a;
            color: #b89ae0;
        }

        .coins {
            grid-column: 3 / 4;
            justify-self: center;
            border-color: #5a4a2a;
            color: #e0c070;
        }

        .user-panel {
            grid-column: 4 / 5;
            justify-self: end;
            padding: 8px 14px;
            gap: 10px;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #1a1a2e;
            border: 1px solid #4a3a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #c8a84e;
            flex-shrink: 0;
        }

        .user-text {
            text-align: right;
            line-height: 1.4;
        }

        .user-name {
            font-size: 14px;
            color: #c8a84e;
            letter-spacing: 1px;
        }

        .user-lvl {
            font-size: 10px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .battle-btn {
            grid-column: 1 / 3;
            grid-row: 2 / 4;
            flex-direction: column;
            gap: 16px;
            font-size: 18px;
            letter-spacing: 4px;
            color: #c8a84e;
            border-color: #3a3a1a;
            text-decoration: none;
            text-transform: uppercase;
        }

        .battle-btn i {
            font-size: 48px;
            color: #c8a84e;
        }

        .challenge-btn {
            grid-column: 3 / 5;
            grid-row: 2 / 3;
            gap: 10px;
            font-size: 15px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .challenge-btn i {
            font-size: 26px;
            color: #c8a84e;
        }

        .story-panel {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
            flex-direction: column;
            gap: 8px;
            border-color: #2a3a2a;
            font-size: 12px;
            color: #777;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .story-panel i {
            font-size: 24px;
            color: #4a8a4a;
        }

        .mission-panel {
            grid-column: 4 / 5;
            grid-row: 3 / 4;
            flex-direction: column;
            gap: 8px;
            border-color: #3a2a2a;
            font-size: 12px;
            color: #777;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .mission-panel i {
            font-size: 24px;
            color: #8a4a4a;
        }

        .shop-panel {
            grid-column: 1 / 2;
            flex-direction: column;
            gap: 8px;
            font-size: 12px;
            color: #777;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .shop-panel i {
            font-size: 24px;
            color: #c8a84e;
        }

        .chests-area {
            grid-column: 2 / 4;
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
        }

        .chests-area::before {
            display: none;
        }

        .chest {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 10px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            max-width: 90px;
            position: relative;
        }

        .chest::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 10px;
            right: 10px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a3a1a, transparent);
            opacity: 0;
            transition: 0.3s;
        }

        .chest:hover {
            border-color: #4a3a1a;
            background: rgba(20, 20, 15, 0.9);
        }

        .chest:hover::before {
            opacity: 1;
        }

        .chest i {
            font-size: 22px;
            color: #888;
        }

        .chest.wooden { border-color: #4a3a2a; }
        .chest.wooden i { color: #8b7355; }
        .chest.iron { border-color: #5a5a5a; }
        .chest.iron i { color: #999; }
        .chest.gold { border-color: #7a6a2a; }
        .chest.gold i { color: #e0c070; }
        .chest.jewel { border-color: #7a3a7a; }
        .chest.jewel i { color: #b89ae0; }

        .chest .name {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .chest .price {
            font-size: 11px;
            color: #c8a84e;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .seasons-panel {
            grid-column: 4 / 5;
            flex-direction: column;
            gap: 8px;
            font-size: 12px;
            color: #777;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .seasons-panel i {
            font-size: 24px;
            color: #4a6a8a;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.imgurl.ir/uploads/e852702_bg-music.mp3" type="audio/mpeg">
    </audio>

    <div class="particles" id="particles"></div>

    <div id="menu-container">
        <div class="top-icons">
            <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-bullhorn"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-headset"></i></button>
        </div>

        <div class="panel currency gems">
            <i class="fa-solid fa-gem"></i>
            <span id="gems-count">۰</span>
        </div>

        <div class="panel currency coins">
            <i class="fa-solid fa-coins"></i>
            <span id="coins-count">۰</span>
        </div>

        <div class="panel user-panel">
            <div class="user-text">
                <div class="user-name" id="display-name">...</div>
                <div class="user-lvl" id="user-level">Lv. ۱</div>
            </div>
            <div class="user-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>

        <a href="game.html" class="panel clickable battle-btn">
            <i class="fa-solid fa-crosshairs"></i>
            <span>مبارزه</span>
        </a>

        <div class="panel clickable challenge-btn">
            <i class="fa-solid fa-trophy"></i>
            <span>چالش</span>
        </div>

        <div class="panel clickable story-panel">
            <i class="fa-solid fa-book"></i>
            <span>خط داستانی</span>
        </div>

        <div class="panel clickable mission-panel">
            <i class="fa-solid fa-list-check"></i>
            <span>ماموریت</span>
        </div>

        <div class="panel clickable shop-panel">
            <i class="fa-solid fa-shop"></i>
            <span>فروشگاه</span>
        </div>

        <div class="chests-area">
            <div class="chest wooden">
                <i class="fa-solid fa-box"></i>
                <div class="name">چوبی</div>
                <div class="price">۱۰۰</div>
            </div>
            <div class="chest iron">
                <i class="fa-solid fa-box"></i>
                <div class="name">آهنی</div>
                <div class="price">۲۰۰</div>
            </div>
            <div class="chest gold">
                <i class="fa-solid fa-box"></i>
                <div class="name">طلایی</div>
                <div class="price">۵۰۰</div>
            </div>
            <div class="chest jewel">
                <i class="fa-solid fa-gem"></i>
                <div class="name">جواهر</div>
                <div class="price">۱۰۰۰</div>
            </div>
        </div>

        <div class="panel clickable seasons-panel">
            <i class="fa-solid fa-scroll"></i>
            <span>فصل‌ها</span>
        </div>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.08;

        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 3 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
            particlesContainer.appendChild(particle);
        }

        const displayName = localStorage.getItem('yt_display_name');
        const level = localStorage.getItem('yt_level');
        const coins = localStorage.getItem('yt_coins');
        const gems = localStorage.getItem('yt_gems');

        document.getElementById('display-name').textContent = displayName || 'کاربر';
        document.getElementById('user-level').textContent = 'Lv. ' + (level || 1);
        document.getElementById('coins-count').textContent = coins || 0;
        document.getElementById('gems-count').textContent = gems || 0;
    </script>
</body>
</html>
