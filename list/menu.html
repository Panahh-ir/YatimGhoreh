<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یتیم غوره - منو</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media screen and (orientation: portrait) {
            html {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow-x: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0d0d0d;
            color: #c0c0c0;
            min-height: 100vh;
            background-image: url('https://cdn.imgurl.ir/uploads/m853286_bg-forest.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.78);
            z-index: 0;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 6s infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            30% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        #menu-container {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
        }

        /* ====== دکمه چوبی ====== */
        .wood-btn {
            position: absolute;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid #3a2510;
            border-radius: 8px;
            background: linear-gradient(180deg, #8b5a2b 0%, #6b3f1f 50%, #4a2510 100%);
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.6),
                inset 0 2px 4px rgba(255,255,255,0.1),
                inset 0 -2px 4px rgba(0,0,0,0.3);
            color: #f5e6c8;
            font-family: 'Lalezar', cursive;
            font-weight: 400;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .wood-btn:hover {
            background: linear-gradient(180deg, #a06b35 0%, #7b4a24 50%, #5a3015 100%);
            border-color: #d4a34a;
            box-shadow: 
                0 6px 12px rgba(0,0,0,0.8),
                inset 0 2px 4px rgba(255,255,255,0.15),
                inset 0 -2px 4px rgba(0,0,0,0.4),
                0 0 15px rgba(212, 163, 74, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        .wood-btn i {
            margin-bottom: 8px;
            color: #d4a34a;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8));
        }

        .wood-btn .btn-label {
            font-size: 14px;
            letter-spacing: 1px;
            color: #f5e6c8;
        }

        .small-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            padding: 0;
        }
        .small-circle i {
            margin: 0;
            font-size: 14px;
        }

        /* ====== جایگاه‌ها ====== */
        #btn-settings { left: 2%; top: 2%; }
        #btn-news { left: 7%; top: 2%; }
        #btn-support { left: 12%; top: 2%; }

        #gems-box { left: 35%; top: 2%; width: 90px; height: 36px; border-radius: 18px; flex-direction: row; gap: 5px; }
        #gems-box i { margin: 0; font-size: 16px; }
        #coins-box { left: 50%; top: 2%; width: 90px; height: 36px; border-radius: 18px; flex-direction: row; gap: 5px; }
        #coins-box i { margin: 0; font-size: 16px; }

        #user-box { right: 2%; top: 2%; width: 140px; height: 36px; border-radius: 18px; flex-direction: row; gap: 8px; }
        #user-box i { margin: 0; font-size: 16px; }

        /* ستون راست */
        #story-btn { right: 2%; top: 20%; width: 180px; height: 20%; }
        #mission-btn { right: 2%; top: 42%; width: 180px; height: 20%; }
        #shop-btn { right: 2%; top: 64%; width: 180px; height: 20%; }

        /* ستون چپ */
        #reward-path { left: 2%; top: 25%; width: 180px; height: 55%; }

        /* مرکز */
        #battle-btn { left: 24%; top: 28%; width: 22%; height: 35%; }
        #challenge-btn { right: 24%; top: 28%; width: 22%; height: 35%; }

        /* پایین */
        #alliance-btn { left: 2%; bottom: 18%; width: 180px; height: 10%; }
        #chest-wooden { left: 26%; bottom: 18%; width: 12%; height: 10%; }
        #chest-iron { left: 38%; bottom: 18%; width: 12%; height: 10%; }
        #chest-gold { left: 50%; bottom: 18%; width: 12%; height: 10%; }
        #chest-jewel { left: 62%; bottom: 18%; width: 12%; height: 10%; }

        .currency-text {
            font-size: 14px;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 700;
        }
        .user-text {
            font-size: 13px;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.imgurl.ir/uploads/e852702_bg-music.mp3" type="audio/mpeg">
    </audio>

    <div class="particles" id="particles"></div>

    <div id="menu-container">

        <div class="wood-btn small-circle" id="btn-settings">
            <i class="fa-solid fa-gear"></i>
        </div>
        <div class="wood-btn small-circle" id="btn-news">
            <i class="fa-solid fa-bullhorn"></i>
        </div>
        <div class="wood-btn small-circle" id="btn-support">
            <i class="fa-solid fa-headset"></i>
        </div>

        <div class="wood-btn" id="gems-box">
            <i class="fa-solid fa-gem"></i>
            <span class="currency-text" id="gems-count">۰</span>
        </div>
        <div class="wood-btn" id="coins-box">
            <i class="fa-solid fa-coins"></i>
            <span class="currency-text" id="coins-count">۰</span>
        </div>

        <div class="wood-btn" id="user-box">
            <i class="fa-solid fa-user"></i>
            <span class="user-text" id="display-name">...</span>
        </div>

        <div class="wood-btn" id="reward-path">
            <i class="fa-solid fa-gift fa-3x"></i>
            <span class="btn-label">مسیر جوایز</span>
        </div>

        <a href="game.html" class="wood-btn" id="battle-btn" style="text-decoration:none;">
            <i class="fa-solid fa-crosshairs fa-3x"></i>
            <span class="btn-label" style="font-size:18px;">مبارزه</span>
        </a>

        <div class="wood-btn" id="challenge-btn">
            <i class="fa-solid fa-trophy fa-3x"></i>
            <span class="btn-label" style="font-size:18px;">چالش</span>
        </div>

        <div class="wood-btn" id="story-btn">
            <i class="fa-solid fa-book-open fa-2x"></i>
            <span class="btn-label">خط داستانی</span>
        </div>

        <div class="wood-btn" id="mission-btn">
            <i class="fa-solid fa-list-check fa-2x"></i>
            <span class="btn-label">ماموریت</span>
        </div>

        <div class="wood-btn" id="shop-btn">
            <i class="fa-solid fa-shop fa-2x"></i>
            <span class="btn-label">فروشگاه</span>
        </div>

        <div class="wood-btn" id="alliance-btn">
            <i class="fa-solid fa-handshake fa-2x"></i>
            <span class="btn-label">اتحاد</span>
        </div>

        <div class="wood-btn" id="chest-wooden">
            <i class="fa-solid fa-box"></i>
            <span class="btn-label">چوبی ۱۰۰</span>
        </div>
        <div class="wood-btn" id="chest-iron">
            <i class="fa-solid fa-box"></i>
            <span class="btn-label">آهنی ۲۰۰</span>
        </div>
        <div class="wood-btn" id="chest-gold">
            <i class="fa-solid fa-box"></i>
            <span class="btn-label">طلایی ۵۰۰</span>
        </div>
        <div class="wood-btn" id="chest-jewel">
            <i class="fa-solid fa-gem"></i>
            <span class="btn-label">جواهر ۱۰۰۰</span>
        </div>

    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.07;

        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 3 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 5) + 's';
            particlesContainer.appendChild(particle);
        }

        document.getElementById('display-name').textContent = localStorage.getItem('yt_display_name') || 'کاربر';
        document.getElementById('coins-count').textContent = localStorage.getItem('yt_coins') || '۰';
        document.getElementById('gems-count').textContent = localStorage.getItem('yt_gems') || '۰';
    </script>
</body>
</html>
