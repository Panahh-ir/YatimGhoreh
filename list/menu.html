<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یتیم غوره - منو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media screen and (orientation: portrait) {
            html {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow-x: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d0d0d;
            color: #c0c0c0;
            min-height: 100vh;
            min-width: 100vw;
            background-image: 
                radial-gradient(ellipse at center, rgba(30, 30, 30, 0.7) 0%, #0d0d0d 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            background-repeat: repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #menu-container {
            width: 95vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: auto auto 1fr auto;
            gap: 12px;
            padding: 10px;
        }

        /* ====== ردیف بالا ====== */
        .top-icons {
            grid-column: 1 / 2;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-start;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a2a;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .icon-btn:hover {
            border-color: #4a3a1a;
            color: #c8a84e;
        }

        .currency-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 14px;
        }

        .currency-box.gems {
            grid-column: 2 / 3;
            justify-self: center;
            border-color: #4a3a6a;
        }

        .currency-box.coins {
            grid-column: 3 / 4;
            justify-self: center;
            border-color: #6a5a3a;
        }

        .currency-box .icon {
            font-size: 18px;
        }

        .user-info {
            grid-column: 4 / 5;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-self: end;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 8px 14px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a2e;
            border: 1px solid #4a3a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-details {
            text-align: right;
        }

        .user-name {
            font-size: 14px;
            color: #c8a84e;
        }

        .user-level {
            font-size: 11px;
            color: #666;
        }

        .xp-bar {
            width: 80px;
            height: 3px;
            background: #1a1a1a;
            border-radius: 2px;
            margin-top: 3px;
        }

        .xp-fill {
            height: 100%;
            background: #c8a84e;
            border-radius: 2px;
        }

        /* ====== ردیف وسط ====== */
        .btn-battle {
            grid-column: 1 / 3;
            grid-row: 2 / 4;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #3a3a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .btn-battle:hover {
            border-color: #c8a84e;
            background: rgba(30, 30, 20, 0.8);
        }

        .btn-battle .icon {
            font-size: 48px;
        }

        .btn-battle .label {
            font-size: 18px;
            color: #c8a84e;
            letter-spacing: 3px;
        }

        .btn-challenge {
            grid-column: 3 / 5;
            grid-row: 2 / 3;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-challenge:hover {
            border-color: #8a7030;
        }

        .btn-challenge .icon {
            font-size: 32px;
        }

        .btn-challenge .label {
            font-size: 16px;
            color: #aaa;
            letter-spacing: 2px;
        }

        .story-box {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a3a2a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .story-box:hover {
            border-color: #4a8a4a;
        }

        .story-box .icon {
            font-size: 28px;
        }

        .story-box .label {
            font-size: 13px;
            color: #888;
            letter-spacing: 1px;
        }

        .mission-box {
            grid-column: 4 / 5;
            grid-row: 3 / 4;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #3a2a2a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mission-box:hover {
            border-color: #8a4a4a;
        }

        .mission-box .icon {
            font-size: 28px;
        }

        .mission-box .label {
            font-size: 13px;
            color: #888;
            letter-spacing: 1px;
        }

        /* ====== ردیف پایین ====== */
        .btn-shop {
            grid-column: 1 / 2;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-shop:hover {
            border-color: #6a6a3a;
        }

        .btn-shop .icon {
            font-size: 28px;
        }

        .btn-shop .label {
            font-size: 13px;
            color: #888;
        }

        .chests-section {
            grid-column: 2 / 4;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .chest-box {
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            max-width: 100px;
        }

        .chest-box:hover {
            border-color: #c8a84e;
        }

        .chest-box .chest-icon {
            font-size: 28px;
        }

        .chest-box .chest-name {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .chest-box .chest-price {
            font-size: 12px;
            color: #c8a84e;
            margin-top: 2px;
        }

        .chest-box.wooden { border-color: #5a4a3a; }
        .chest-box.iron { border-color: #6a6a6a; }
        .chest-box.gold { border-color: #8a7a3a; }
        .chest-box.jewel { border-color: #8a3a8a; }

        .seasons-box {
            grid-column: 4 / 5;
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .seasons-box:hover {
            border-color: #4a6a8a;
        }

        .seasons-box .icon {
            font-size: 28px;
        }

        .seasons-box .label {
            font-size: 13px;
            color: #888;
        }

        /* ====== عمومی ====== */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.imgurl.ir/uploads/e852702_bg-music.mp3" type="audio/mpeg">
    </audio>

    <div id="menu-container">
        <!-- ردیف بالا -->
        <div class="top-icons">
            <button class="icon-btn">⚙️</button>
            <button class="icon-btn">📢</button>
            <button class="icon-btn">💬</button>
        </div>

        <div class="currency-box gems">
            <span class="icon">💎</span>
            <span id="gems-count">۰</span>
        </div>

        <div class="currency-box coins">
            <span class="icon">🪙</span>
            <span id="coins-count">۰</span>
        </div>

        <div class="user-info">
            <div class="user-details">
                <div class="user-name" id="display-name">...</div>
                <div class="user-level" id="user-level">Lv. ۱</div>
                <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width: 0%;"></div></div>
            </div>
            <div class="user-avatar">👤</div>
        </div>

        <!-- ردیف وسط -->
        <a href="game.html" class="btn-battle">
            <span class="icon">⚔️</span>
            <span class="label">مبارزه</span>
        </a>

        <div class="btn-challenge" onclick="alert('به‌زودی')">
            <span class="icon">🏆</span>
            <span class="label">چالش</span>
        </div>

        <div class="story-box" onclick="alert('به‌زودی')">
            <span class="icon">📖</span>
            <span class="label">خط داستانی</span>
        </div>

        <div class="mission-box" onclick="alert('به‌زودی')">
            <span class="icon">📋</span>
            <span class="label">ماموریت</span>
        </div>

        <!-- ردیف پایین -->
        <div class="btn-shop" onclick="alert('به‌زودی')">
            <span class="icon">🏪</span>
            <span class="label">فروشگاه</span>
        </div>

        <div class="chests-section">
            <div class="chest-box wooden" onclick="alert('صندوق چوبی - ۱۰۰ سکه')">
                <div class="chest-icon">🪵</div>
                <div class="chest-name">چوبی</div>
                <div class="chest-price">۱۰۰</div>
            </div>
            <div class="chest-box iron" onclick="alert('صندوق آهنی - ۲۰۰ سکه')">
                <div class="chest-icon">🔩</div>
                <div class="chest-name">آهنی</div>
                <div class="chest-price">۲۰۰</div>
            </div>
            <div class="chest-box gold" onclick="alert('صندوق طلایی - ۵۰۰ سکه')">
                <div class="chest-icon">🥇</div>
                <div class="chest-name">طلایی</div>
                <div class="chest-price">۵۰۰</div>
            </div>
            <div class="chest-box jewel" onclick="alert('صندوق جواهر - ۱۰۰۰ سکه')">
                <div class="chest-icon">💠</div>
                <div class="chest-name">جواهر</div>
                <div class="chest-price">۱۰۰۰</div>
            </div>
        </div>

        <div class="seasons-box" onclick="alert('به‌زودی')">
            <span class="icon">📜</span>
            <span class="label">فصل‌ها</span>
        </div>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.08;

        const API_URL = 'https://script.google.com/macros/s/AKfycbwNDr8V1h-hWcI-G20xwPkhR7D8iZFX4Y1UM8VdeHbPfSZDK-5d6I0niWTRrUQ1GLL-HQ/exec';

        async function loadPlayerData() {
            const params = new URLSearchParams(window.location.search);
            const username = params.get('username');

            if (!username) {
                window.location.href = '../index.html';
                return;
            }

            const result = await fetch(API_URL + '?action=login&username=' + username + '&password=nocheck');
            const data = await result.json();

            if (data.success || data.display_name) {
                document.getElementById('display-name').textContent = data.display_name;
                document.getElementById('user-level').textContent = 'Lv. ' + data.level;
                document.getElementById('coins-count').textContent = data.coins || 0;
                document.getElementById('gems-count').textContent = data.gems || 0;
            }
        }

        loadPlayerData();
    </script>
</body>
</html>
