<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یتیم غوره - منو</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media screen and (orientation: portrait) {
            html {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow-x: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d0d0d;
            color: #c0c0c0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://cdn.imgurl.ir/uploads/m853286_bg-forest.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 6s infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            30% { opacity: 0.25; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        #menu-container {
            position: relative;
            z-index: 2;
            width: 95vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 200px 1fr 1fr 1fr;
            grid-template-rows: auto auto 1fr auto;
            gap: 10px;
            padding: 10px;
        }

        /* ====== پنل عمومی ====== */
        .panel {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            position: relative;
            backdrop-filter: blur(4px);
        }

        .clickable {
            cursor: pointer;
        }

        .clickable:hover {
            border-color: #5a4a2a;
            background: rgba(20, 18, 12, 0.9);
        }

        /* ====== ردیف ۱: top bar ====== */
        .top-bar {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: none;
            border: none;
            padding: 0;
            gap: 15px;
        }

        .top-bar::before {
            display: none;
        }

        .top-icons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(15, 15, 22, 0.9);
            border: 1px solid #2a2a2a;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .icon-btn:hover {
            border-color: #c8a84e;
            color: #c8a84e;
        }

        .currencies {
            display: flex;
            gap: 0;
            align-items: center;
            border-radius: 6px;
            overflow: hidden;
        }

        .currency {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            font-size: 13px;
            letter-spacing: 1px;
            background: rgba(15, 15, 22, 0.9);
            border: 1px solid #2a2a2a;
        }

        .currency i {
            font-size: 14px;
        }

        .gems {
            color: #b89ae0;
            border-right: none;
            border-radius: 0 6px 6px 0;
        }

        .coins {
            color: #e0c070;
            border-left: none;
            border-radius: 6px 0 0 6px;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: rgba(15, 15, 22, 0.9);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1a1a2e;
            border: 1px solid #4a3a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #c8a84e;
            flex-shrink: 0;
        }

        .user-text {
            text-align: right;
            line-height: 1.3;
        }

        .user-name {
            font-size: 12px;
            color: #c8a84e;
        }

        .user-lvl {
            font-size: 9px;
            color: #555;
        }

        /* ====== سمت چپ: منوی لیستی ====== */
        .side-menu {
            grid-column: 1 / 2;
            grid-row: 2 / 5;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: none;
            border: none;
            padding: 0;
        }

        .side-menu::before {
            display: none;
        }

        .side-item {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(4px);
        }

        .side-item:hover {
            border-color: #5a4a2a;
            background: rgba(20, 18, 12, 0.9);
        }

        .side-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .side-item .label {
            font-size: 12px;
            letter-spacing: 2px;
            color: #999;
        }

        .side-item.story i { color: #4a8a4a; }
        .side-item.mission i { color: #8a4a4a; }
        .side-item.shop i { color: #c8a84e; }

        /* ====== مرکز: مبارزه و چالش - کوچیکتر و افقی ====== */
        .center-area {
            grid-column: 2 / 4;
            grid-row: 2 / 3;
            display: flex;
            gap: 10px;
            background: none;
            border: none;
            padding: 0;
        }

        .center-area::before {
            display: none;
        }

        .main-btn {
            flex: 1;
            max-width: 180px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #3a3a1a;
            border-radius: 6px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            backdrop-filter: blur(4px);
            padding: 12px 16px;
        }

        .main-btn:hover {
            border-color: #c8a84e;
            background: rgba(25, 22, 12, 0.9);
        }

        .main-btn i {
            font-size: 22px;
            color: #c8a84e;
        }

        .main-btn .label {
            font-size: 13px;
            letter-spacing: 2px;
            color: #c8a84e;
        }

        /* ====== سمت راست: مسیر جوایز و اتحاد ====== */
        .right-area {
            grid-column: 4 / 5;
            grid-row: 2 / 5;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: none;
            border: none;
            padding: 0;
        }

        .right-area::before {
            display: none;
        }

        .reward-path {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #3a3a2a;
            border-radius: 6px;
            padding: 20px;
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(4px);
            font-size: 13px;
            letter-spacing: 2px;
            color: #999;
        }

        .reward-path:hover {
            border-color: #5a4a2a;
            background: rgba(20, 18, 12, 0.9);
            color: #c8a84e;
        }

        .reward-path i {
            font-size: 28px;
            color: #e0c070;
        }

        .alliance {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(4px);
            font-size: 12px;
            letter-spacing: 2px;
            color: #999;
        }

        .alliance:hover {
            border-color: #4a6a8a;
            background: rgba(12, 15, 20, 0.9);
            color: #8ab8e0;
        }

        .alliance i {
            font-size: 24px;
            color: #4a6a8a;
        }

        /* ====== چست‌ها - سمت چپ پایین ====== */
        .chests-row {
            grid-column: 2 / 4;
            grid-row: 3 / 4;
            display: flex;
            gap: 8px;
            background: none;
            border: none;
            padding: 0;
            align-items: stretch;
        }

        .chests-row::before {
            display: none;
        }

        .chest {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .chest:hover {
            border-color: #5a4a2a;
            background: rgba(20, 18, 12, 0.9);
        }

        .chest i {
            font-size: 20px;
        }

        .chest .name {
            font-size: 10px;
            color: #666;
        }

        .chest .price {
            font-size: 11px;
            color: #c8a84e;
        }

        .chest.wooden i { color: #8b7355; }
        .chest.iron i { color: #999; }
        .chest.gold i { color: #e0c070; }
        .chest.jewel i { color: #b89ae0; }

        /* ====== فضای خالی ====== */
        .empty-space {
            grid-column: 2 / 4;
            grid-row: 4 / 5;
            background: none;
            border: none;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.imgurl.ir/uploads/e852702_bg-music.mp3" type="audio/mpeg">
    </audio>

    <div class="particles" id="particles"></div>

    <div id="menu-container">

        <!-- ردیف بالا: همه تو یه ردیف -->
        <div class="top-bar">
            <div class="top-icons">
                <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
                <button class="icon-btn"><i class="fa-solid fa-bullhorn"></i></button>
                <button class="icon-btn"><i class="fa-solid fa-headset"></i></button>
            </div>

            <div class="currencies">
                <div class="currency gems">
                    <i class="fa-solid fa-gem"></i>
                    <span id="gems-count">۰</span>
                </div>
                <div class="currency coins">
                    <i class="fa-solid fa-coins"></i>
                    <span id="coins-count">۰</span>
                </div>
            </div>

            <div class="user-panel">
                <div class="user-text">
                    <div class="user-name" id="display-name">...</div>
                    <div class="user-lvl" id="user-level">Lv. ۱</div>
                </div>
                <div class="user-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </div>

        <!-- سمت چپ: منوی لیستی -->
        <div class="side-menu">
            <div class="side-item story">
                <i class="fa-solid fa-book"></i>
                <span class="label">خط داستانی</span>
            </div>
            <div class="side-item mission">
                <i class="fa-solid fa-list-check"></i>
                <span class="label">ماموریت</span>
            </div>
            <div class="side-item shop">
                <i class="fa-solid fa-shop"></i>
                <span class="label">فروشگاه</span>
            </div>
        </div>

        <!-- مرکز بالا: مبارزه و چالش -->
        <div class="center-area">
            <a href="game.html" class="main-btn">
                <i class="fa-solid fa-crosshairs"></i>
                <span class="label">مبارزه</span>
            </a>
            <div class="main-btn">
                <i class="fa-solid fa-trophy"></i>
                <span class="label">چالش</span>
            </div>
        </div>

        <!-- سمت راست: مسیر جوایز و اتحاد -->
        <div class="right-area">
            <div class="reward-path">
                <i class="fa-solid fa-gift"></i>
                <span>مسیر جوایز</span>
            </div>
            <div class="alliance">
                <i class="fa-solid fa-handshake"></i>
                <span>اتحاد</span>
            </div>
        </div>

        <!-- پایین وسط: صندوقچه‌ها -->
        <div class="chests-row">
            <div class="chest wooden">
                <i class="fa-solid fa-box"></i>
                <div class="name">چوبی</div>
                <div class="price">۱۰۰</div>
            </div>
            <div class="chest iron">
                <i class="fa-solid fa-box"></i>
                <div class="name">آهنی</div>
                <div class="price">۲۰۰</div>
            </div>
            <div class="chest gold">
                <i class="fa-solid fa-box"></i>
                <div class="name">طلایی</div>
                <div class="price">۵۰۰</div>
            </div>
            <div class="chest jewel">
                <i class="fa-solid fa-gem"></i>
                <div class="name">جواهر</div>
                <div class="price">۱۰۰۰</div>
            </div>
        </div>

        <!-- فضای خالی پایین -->
        <div class="empty-space"></div>

    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.07;

        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 3 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 5) + 's';
            particlesContainer.appendChild(particle);
        }

        const displayName = localStorage.getItem('yt_display_name');
        const level = localStorage.getItem('yt_level');
        const coins = localStorage.getItem('yt_coins');
        const gems = localStorage.getItem('yt_gems');

        document.getElementById('display-name').textContent = displayName || 'کاربر';
        document.getElementById('user-level').textContent = 'Lv. ' + (level || 1);
        document.getElementById('coins-count').textContent = coins || 0;
        document.getElementById('gems-count').textContent = gems || 0;
    </script>
</body>
</html>
