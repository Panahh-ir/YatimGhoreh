<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باغ خاطرات - Card Battle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f5d76e;
            --dark: #0a0f0a;
            --glass: rgba(10, 20, 10, 0.6);
            --glass-border: rgba(201, 168, 76, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background: #050a05;
            min-height: 100vh;
            color: #e0d5c0;
            overflow-x: hidden;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ============ پس‌زمینه چندلایه ============ */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-forest {
            background: url('https://images.unsplash.com/photo-1509803874385-db7c23652552?w=1920') center/cover no-repeat;
            filter: brightness(0.35) saturate(0.7);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* مه */
        .fog {
            position: fixed;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.25;
            background: radial-gradient(ellipse at 30% 60%, rgba(180, 200, 180, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 40%, rgba(150, 180, 150, 0.3) 0%, transparent 60%);
            animation: fogDrift 20s ease-in-out infinite;
        }
        .fog:nth-child(2) {
            animation-delay: -10s;
            opacity: 0.2;
        }
        @keyframes fogDrift {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(3%);
            }
            50% {
                transform: translateX(-2%);
            }
            75% {
                transform: translateX(4%);
            }
        }

        /* ذرات شناور */
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .fp {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            filter: blur(1px);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* کرم شب‌تاب‌های موس */
        .firefly {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #ffe9a0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            box-shadow: 0 0 15px 5px rgba(255, 233, 160, 0.7), 0 0 35px 10px rgba(200, 220, 150, 0.4);
            animation: ffPulse 2s ease-in-out infinite;
        }
        @keyframes ffPulse {
            0%,
            100% {
                box-shadow: 0 0 15px 5px rgba(255, 233, 160, 0.7), 0 0 35px 10px rgba(200, 220, 150, 0.4);
            }
            50% {
                box-shadow: 0 0 8px 3px rgba(255, 233, 160, 0.4), 0 0 20px 6px rgba(200, 220, 150, 0.2);
            }
        }

        /* ============ لایه اصلی ============ */
        .container {
            position: relative;
            z-index: 5;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 25px;
            min-height: 100vh;
        }

        /* ============ جغد نگهبان ============ */
        .owl {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 6;
            font-size: 55px;
            filter: drop-shadow(0 0 20px rgba(180, 160, 100, 0.5));
            animation: owlBreathe 4s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .owl:hover {
            transform: scale(1.2) rotate(-5deg);
        }
        .owl-eye {
            display: inline-block;
            animation: owlBlink 3s ease-in-out infinite;
        }
        @keyframes owlBlink {
            0%,
            90%,
            100% {
                transform: scaleY(1);
            }
            95% {
                transform: scaleY(0.05);
            }
        }
        @keyframes owlBreathe {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* ============ پیچک‌های چپ ============ */
        .vines {
            position: fixed;
            top: 0;
            left: 0;
            width: 180px;
            height: 100%;
            z-index: 4;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 50%, rgba(20, 40, 15, 0.5) 0%, transparent 70%);
            border-right: 2px solid rgba(60, 100, 40, 0.2);
        }
        .vines::before {
            content: '🌿🍃🌱🪴';
            position: absolute;
            top: 10%;
            left: 10px;
            font-size: 40px;
            letter-spacing: 20px;
            opacity: 0.5;
            animation: vineSway 6s ease-in-out infinite;
        }
        @keyframes vineSway {
            0%,
            100% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(2deg);
            }
        }

        /* تار عنکبوت */
        .cobweb {
            position: fixed;
            top: 0;
            left: 180px;
            width: 60px;
            height: 60px;
            z-index: 4;
            pointer-events: none;
            opacity: 0.3;
            border-left: 1px solid rgba(200, 200, 200, 0.3);
            border-bottom: 1px solid rgba(200, 200, 200, 0.3);
            border-radius: 0 0 0 60px;
        }

        /* ============ هدر ============ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* کارت کاربر */
        .user-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border);
            border-radius: 22px;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }
        .user-card::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 80px;
            height: 150%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.04), transparent);
            transform: rotate(25deg);
            animation: cardShine 4s ease-in-out infinite;
        }
        @keyframes cardShine {
            0%,
            100% {
                right: -20%;
            }
            50% {
                right: 120%;
            }
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2.5px solid var(--gold);
            background: url('https://i.pravatar.cc/150?img=12') center/cover;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
        }
        .user-info-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .user-name {
            font-size: 17px;
            font-weight: bold;
            color: #f5e6c8;
            text-shadow: 0 0 10px rgba(245, 230, 200, 0.3);
        }
        .user-level {
            font-size: 12px;
            color: var(--gold);
        }
        .xp-bar {
            width: 130px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .xp-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, #8b6914, var(--gold-light), #8b6914);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: xpWave 2s ease-in-out infinite;
        }
        @keyframes xpWave {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* منابع */
        .resources {
            display: flex;
            gap: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border);
            border-radius: 30px;
            padding: 14px 35px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .res-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: bold;
            position: relative;
        }
        .res-item i {
            font-size: 26px;
            animation: resGlow 2s ease-in-out infinite;
        }
        .coin i {
            color: #f5d76e;
            animation-delay: 0s;
        }
        .diamond i {
            color: #5dade2;
            animation-delay: 0.5s;
        }
        @keyframes resGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 6px currentColor);
            }
            50% {
                filter: drop-shadow(0 0 18px currentColor);
            }
        }

        /* منوی بالا */
        .top-menu {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .menu-btn {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1.5px solid var(--glass-border);
            color: #c0b8a5;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }
        .menu-btn i {
            font-size: 14px;
            color: var(--gold);
        }
        .menu-btn:hover {
            background: rgba(201, 168, 76, 0.2);
            border-color: var(--gold);
            color: #f5e6c8;
            box-shadow: 0 0 25px rgba(201, 168, 76, 0.2);
            transform: translateY(-2px);
        }

        /* ============ محتوای اصلی ============ */
        .main-content {
            display: flex;
            gap: 25px;
            margin-top: 30px;
            align-items: flex-start;
        }

        /* بخش وسط */
        .center-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        /* عنوان */
        .game-title-area {
            text-align: center;
            margin-bottom: 5px;
        }
        .game-subtitle {
            font-size: 14px;
            color: rgba(200, 200, 180, 0.6);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* دکمه‌های مبارزه */
        .battle-buttons {
            display: flex;
            gap: 30px;
        }
        .battle-btn {
            padding: 24px 60px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 22px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.35s;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
        }
        .battle-btn i {
            font-size: 28px;
        }
        .battle-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .battle-btn:hover::before {
            opacity: 1;
        }

        .btn-fight {
            background: linear-gradient(135deg, #6b1010, #a51d1d, #6b1010);
            background-size: 200% 200%;
            color: #fff;
            box-shadow: 0 10px 35px rgba(180, 30, 30, 0.5);
            animation: btnPulseRed 2.5s ease-in-out infinite;
        }
        @keyframes btnPulseRed {
            0%,
            100% {
                box-shadow: 0 10px 35px rgba(180, 30, 30, 0.5);
            }
            50% {
                box-shadow: 0 15px 50px rgba(255, 50, 50, 0.7);
            }
        }
        .btn-fight:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 50px rgba(255, 40, 40, 0.8);
            background-position: 100% 100%;
        }

        .btn-challenge {
            background: linear-gradient(135deg, #0d3b5e, #1a6daa, #0d3b5e);
            background-size: 200% 200%;
            color: #fff;
            box-shadow: 0 10px 35px rgba(30, 100, 180, 0.5);
            animation: btnPulseBlue 2.5s ease-in-out infinite;
            animation-delay: 1s;
        }
        @keyframes btnPulseBlue {
            0%,
            100% {
                box-shadow: 0 10px 35px rgba(30, 100, 180, 0.5);
            }
            50% {
                box-shadow: 0 15px 50px rgba(50, 150, 255, 0.7);
            }
        }
        .btn-challenge:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 50px rgba(50, 150, 255, 0.8);
            background-position: 100% 100%;
        }

        /* استریم آنلاین */
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 12px;
            color: #aaa;
        }
        .live-dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            animation: livePulse 1.5s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%,
            100% {
                box-shadow: 0 0 5px #2ecc71;
            }
            50% {
                box-shadow: 0 0 20px #2ecc71;
            }
        }

        /* گاو صندوق‌ها */
        .chests-section {
            display: flex;
            gap: 30px;
        }
        .chest {
            width: 130px;
            height: 155px;
            background: var(--glass);
            backdrop-filter: blur(18px);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.4s;
            font-size: 14px;
            color: #bbb;
            position: relative;
            overflow: hidden;
        }
        .chest i {
            font-size: 48px;
            transition: all 0.4s;
        }
        .chest.wood {
            border-color: rgba(180, 150, 100, 0.4);
        }
        .chest.wood i {
            color: #b8956a;
        }
        .chest.silver {
            border-color: rgba(180, 180, 190, 0.4);
        }
        .chest.silver i {
            color: #bdc3c7;
        }
        .chest.gold {
            border-color: rgba(220, 190, 80, 0.5);
        }
        .chest.gold i {
            color: #f5d76e;
        }
        .chest:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
            border-color: var(--gold);
        }
        .chest:hover i {
            transform: scale(1.15) rotate(-5deg);
        }
        .chest::after {
            content: '';
            position: absolute;
            top: -40%;
            right: -40%;
            width: 60%;
            height: 150%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            transform: rotate(30deg);
            animation: chestShine 5s ease-in-out infinite;
        }
        @keyframes chestShine {
            0%,
            100% {
                right: -40%;
            }
            50% {
                right: 140%;
            }
        }
        .chest-label {
            font-size: 11px;
            opacity: 0.7;
        }

            <!-- خط داستانی -->
            <div class="story-section">
                <div class="story-header">
                    <i class="fas fa-book-open"></i> خط داستانی
                </div>
                <i class="fas fa-scroll story-scroll-icon"></i>
                <button class="story-btn">
                    <i class="fas fa-feather-alt"></i> ورود به داستان
                </button>
                <div class="chapter-list">
                    <div class="chapter-item">
                        <i class="fas fa-bookmark"></i> فصل اول: باغ خاطرات
                        <span class="chapter-badge">پایان</span>
                    </div>
                    <div class="chapter-item">
                        <i class="fas fa-bookmark"></i> فصل دوم: کابوس
                        <span class="chapter-badge">جدید</span>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        // ============ ذرات شناور ============
        const fpContainer = document.getElementById('floatingParticles');
        const colors = [
            'rgba(255,233,160,0.7)',
            'rgba(180,220,160,0.6)',
            'rgba(160,200,220,0.5)',
            'rgba(220,200,150,0.6)',
            'rgba(200,220,200,0.5)'
        ];

        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.classList.add('fp');
            const size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDuration = Math.random() * 15 + 10 + 's';
            p.style.animationDelay = Math.random() * 15 + 's';
            fpContainer.appendChild(p);
        }

        // ============ کرم شب‌تاب دنبال موس ============
        const fireflies = [];
        const maxFireflies = 15;

        document.addEventListener('mousemove', (e) => {
            const ff = document.createElement('div');
            ff.classList.add('firefly');
            ff.style.left = e.clientX + 'px';
            ff.style.top = e.clientY + 'px';
            document.body.appendChild(ff);
            fireflies.push(ff);

            if (fireflies.length > maxFireflies) {
                const old = fireflies.shift();
                old.style.transition = 'opacity 0.8s';
                old.style.opacity = '0';
                setTimeout(() => old.remove(), 800);
            }

            setTimeout(() => {
                ff.style.transition = 'opacity 1.5s';
                ff.style.opacity = '0';
                setTimeout(() => ff.remove(), 1500);
            }, 2000);
        });

        // لمس
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const ff = document.createElement('div');
            ff.classList.add('firefly');
            ff.style.left = touch.clientX + 'px';
            ff.style.top = touch.clientY + 'px';
            document.body.appendChild(ff);
            fireflies.push(ff);
            if (fireflies.length > maxFireflies) {
                const old = fireflies.shift();
                old.style.transition = 'opacity 0.8s';
                old.style.opacity = '0';
                setTimeout(() => old.remove(), 800);
            }
            setTimeout(() => {
                ff.style.transition = 'opacity 1.5s';
                ff.style.opacity = '0';
                setTimeout(() => ff.remove(), 1500);
            }, 2000);
        });

        // ============ رویدادهای کلیک ============
        document.querySelector('.btn-fight').addEventListener('click', () => {
            alert('⚔️ بخش مبارزه به زودی...');
        });
        document.querySelector('.btn-challenge').addEventListener('click', () => {
            alert('🏆 بخش چالش به زودی...');
        });
        document.querySelector('.story-btn').addEventListener('click', () => {
            alert('📖 در حال انتقال به خط داستانی...');
        });
        document.querySelectorAll('.chest').forEach(ch => {
            ch.addEventListener('click', function() {
                const t = this.querySelector('span:first-of-type').textContent;
                alert('🎁 باز کردن گاو صندوق ' + t + '...');
            });
        });
        document.querySelectorAll('.menu-btn').forEach(b => {
            b.addEventListener('click', function() {
                alert('بخش ' + this.textContent.trim() + ' به زودی...');
            });
        });
        document.querySelectorAll('.chapter-item').forEach(c => {
            c.addEventListener('click', function() {
                const txt = this.textContent.trim();
                alert('📜 ' + txt);
            });
        });

        // جغد
        document.querySelector('.owl').addEventListener('click', () => {
            alert('🦉 هووووت... جغد دانا میگه: هنوز هیچ رازی فاش نشده!');
        });

        console.log('🌳 باغ خاطرات - صفحه اصلی آماده‌ست!');
    </script>

</body>
</html>
