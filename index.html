<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروانه‌ای در باغ - ورود</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #auth-container {
            background: #16213e;
            border-radius: 16px;
            padding: 40px 30px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        #auth-container h1 {
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 24px;
        }

        #auth-container .subtitle {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .tab-buttons {
            display: flex;
            gap: 0;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            background: #0f3460;
            color: #aaa;
            transition: 0.2s;
            font-family: inherit;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #ccc;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
        }

        #auth-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
            margin-top: 5px;
            font-family: inherit;
            transition: 0.2s;
        }

        #auth-btn:hover {
            background: #ffed4a;
        }

        #auth-btn:disabled {
            background: #555;
            cursor: not-allowed;
            color: #999;
        }

        #auth-msg {
            margin-top: 15px;
            font-size: 13px;
            min-height: 20px;
        }

        #auth-msg.error {
            color: #ff6b6b;
        }

        #auth-msg.success {
            color: #4caf50;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="auth-container">
        <h1>🦋 پروانه‌ای در باغ</h1>
        <p class="subtitle">بازی کارتی استراتژیک ۲ نفره</p>

        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-login">ورود</button>
            <button class="tab-btn" id="tab-register">ثبت‌نام</button>
        </div>

        <!-- فرم ورود -->
        <div id="login-form">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="login-username" placeholder="نام کاربری را وارد کنید">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="login-password" placeholder="رمز عبور را وارد کنید">
            </div>
            <button id="auth-btn-login">ورود</button>
        </div>

        <!-- فرم ثبت‌نام -->
        <div id="register-form" class="hidden">
            <div class="form-group">
                <label>اسم نمایشی</label>
                <input type="text" id="reg-display" placeholder="اسم شما در بازی">
            </div>
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="reg-username" placeholder="نام کاربری یکتا">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="reg-password" placeholder="حداقل ۴ کاراکتر">
            </div>
            <button id="auth-btn-register">ثبت‌نام</button>
        </div>

        <div id="auth-msg"></div>
    </div>

    <script>
        // =====================
        // URL Apps Script
        // =====================
        const API_URL = 'https://script.google.com/macros/s/AKfycbwNDr8V1h-hWcI-G20xwPkhR7D8iZFX4Y1UM8VdeHbPfSZDK-5d6I0niWTRrUQ1GLL-HQ/exec';

        // =====================
        // تب‌ها
        // =====================
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authMsg = document.getElementById('auth-msg');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            authMsg.textContent = '';
            authMsg.className = '';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            authMsg.textContent = '';
            authMsg.className = '';
        });

        // =====================
        // تابع کمکی
        // =====================
        function showMsg(text, type) {
            authMsg.textContent = text;
            authMsg.className = type;
        }

        async function callAPI(params) {
            const url = API_URL + '?' + new URLSearchParams(params).toString();
            const response = await fetch(url);
            return await response.json();
        }

        // =====================
        // ورود
        // =====================
        document.getElementById('auth-btn-login').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) {
                showMsg('لطفاً همه فیلدها را پر کنید', 'error');
                return;
            }

            showMsg('در حال ورود...', '');
            const result = await callAPI({ action: 'login', username, password });

            if (result.success) {
                showMsg('✅ ورود موفق! خوش آمدی ' + result.display_name, 'success');
                // ذخیره اطلاعات کاربر
                localStorage.setItem('player', JSON.stringify(result));
                // بعداً: رفتن به صفحه اصلی
                console.log('ورود موفق:', result);
            } else {
                showMsg('❌ ' + result.error, 'error');
            }
        });

        // =====================
        // ثبت‌نام
        // =====================
        document.getElementById('auth-btn-register').addEventListener('click', async () => {
            const displayName = document.getElementById('reg-display').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!displayName || !username || !password) {
                showMsg('لطفاً همه فیلدها را پر کنید', 'error');
                return;
            }

            if (password.length < 4) {
                showMsg('رمز عبور حداقل ۴ کاراکتر باشد', 'error');
                return;
            }

            showMsg('در حال ثبت‌نام...', '');
            const result = await callAPI({ action: 'register', display_name: displayName, username, password });

            if (result.success) {
                showMsg('✅ ثبت‌نام موفق! حالا می‌تونی وارد بشی', 'success');
                // پاک کردن فرم
                document.getElementById('reg-display').value = '';
                document.getElementById('reg-username').value = '';
                document.getElementById('reg-password').value = '';
                // برگشت به تب ورود
                tabLogin.click();
            } else {
                showMsg('❌ ' + result.error, 'error');
            }
        });
    </script>
</body>
</html>
