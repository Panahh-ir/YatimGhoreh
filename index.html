<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروانه‌ای در باغ - ورود</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d0d0d;
            color: #c0c0c0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(ellipse at center, rgba(30, 30, 30, 0.7) 0%, #0d0d0d 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            background-repeat: repeat;
        }

        /* افکت ذرات شناور */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 6s infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            30% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        #auth-container {
            position: relative;
            z-index: 1;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 45px 35px;
            width: 400px;
            text-align: center;
            box-shadow: 
                0 0 60px rgba(0, 0, 0, 0.8),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #auth-container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a3a1a, transparent);
        }

        #auth-container::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a3a1a, transparent);
        }

        #auth-container h1 {
            color: #c8a84e;
            margin-bottom: 6px;
            font-size: 26px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        #auth-container .subtitle {
            color: #555;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .tab-buttons {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #1a1a1a;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            background: transparent;
            color: #555;
            letter-spacing: 3px;
            transition: 0.3s;
            font-family: inherit;
            position: relative;
            text-transform: uppercase;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: #c8a84e;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: #c8a84e;
        }

        .tab-btn.active::after {
            width: 60%;
        }

        .tab-btn:hover {
            color: #8a7030;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 2px;
            border: 1px solid #1a1a1a;
            background: #0a0a0f;
            color: #c0c0c0;
            font-size: 14px;
            font-family: inherit;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a3a1a;
            box-shadow: 0 0 10px rgba(200, 168, 78, 0.05);
        }

        .form-group input::placeholder {
            color: #2a2a2a;
        }

        .btn-auth {
            width: 100%;
            padding: 13px;
            border: 1px solid #4a3a1a;
            border-radius: 2px;
            font-size: 13px;
            cursor: pointer;
            background: transparent;
            color: #c8a84e;
            letter-spacing: 4px;
            margin-top: 10px;
            font-family: inherit;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-auth:hover {
            background: rgba(200, 168, 78, 0.05);
            border-color: #c8a84e;
        }

        .btn-auth:disabled {
            border-color: #1a1a1a;
            color: #333;
            cursor: not-allowed;
        }

        .btn-auth:disabled:hover {
            background: transparent;
        }

        #auth-msg {
            margin-top: 18px;
            font-size: 12px;
            min-height: 20px;
            letter-spacing: 1px;
        }

        #auth-msg.error {
            color: #8b3a3a;
        }

        #auth-msg.success {
            color: #4a6b3a;
        }

        .hidden {
            display: none;
        }

        /* دیوایدر */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0 15px;
            color: #2a2a2a;
            font-size: 10px;
            letter-spacing: 3px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1a1a1a;
        }
    </style>
</head>
<body>

    <!-- موزیک پس‌زمینه -->
    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.imgurl.ir/uploads/e852702_bg-music.mp3" type="audio/mpeg">
    </audio>

    <!-- ذرات شناور -->
    <div class="particles" id="particles"></div>

    <div id="auth-container">
        <h1>پروانه‌ای در باغ</h1>
        <p class="subtitle">بازی کارتی استراتژیک</p>

        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-login">ورود</button>
            <button class="tab-btn" id="tab-register">ثبت‌نام</button>
        </div>

        <!-- فرم ورود -->
        <div id="login-form">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="login-username" placeholder="نام کاربری">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="login-password" placeholder="رمز عبور">
            </div>
            <button class="btn-auth" id="auth-btn-login">ورود</button>
        </div>

        <!-- فرم ثبت‌نام -->
        <div id="register-form" class="hidden">
            <div class="form-group">
                <label>اسم نمایشی</label>
                <input type="text" id="reg-display" placeholder="اسم شما در بازی">
            </div>
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="reg-username" placeholder="نام کاربری یکتا">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="reg-password" placeholder="حداقل ۴ کاراکتر">
            </div>
            <button class="btn-auth" id="auth-btn-register">ثبت‌نام</button>
        </div>

        <div id="auth-msg"></div>
    </div>

    <script>
        // =====================
        // موزیک پس‌زمینه - صدای آروم
        // =====================
        const bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.08;

        // =====================
        // ذرات شناور
        // =====================
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 3 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
            particlesContainer.appendChild(particle);
        }

        // =====================
        // URL Apps Script
        // =====================
        const API_URL = 'https://script.google.com/macros/s/AKfycbwNDr8V1h-hWcI-G20xwPkhR7D8iZFX4Y1UM8VdeHbPfSZDK-5d6I0niWTRrUQ1GLL-HQ/exec';

        // =====================
        // تب‌ها
        // =====================
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authMsg = document.getElementById('auth-msg');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            authMsg.textContent = '';
            authMsg.className = '';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            authMsg.textContent = '';
            authMsg.className = '';
        });

        // =====================
        // تابع کمکی
        // =====================
        function showMsg(text, type) {
            authMsg.textContent = text;
            authMsg.className = type;
        }

        async function callAPI(params) {
            const url = API_URL + '?' + new URLSearchParams(params).toString();
            const response = await fetch(url);
            return await response.json();
        }

        // =====================
        // ورود
        // =====================
        document.getElementById('auth-btn-login').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) {
                showMsg('لطفاً همه فیلدها را پر کنید', 'error');
                return;
            }

            showMsg('در حال ورود...', '');
            const result = await callAPI({ action: 'login', username, password });

            if (result.success) {
                showMsg('ورود موفق', 'success');
                localStorage.setItem('player', JSON.stringify(result));
                console.log('ورود موفق:', result);
            } else {
                showMsg(result.error, 'error');
            }
        });

        // =====================
        // ثبت‌نام
        // =====================
        document.getElementById('auth-btn-register').addEventListener('click', async () => {
            const displayName = document.getElementById('reg-display').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!displayName || !username || !password) {
                showMsg('لطفاً همه فیلدها را پر کنید', 'error');
                return;
            }

            if (password.length < 4) {
                showMsg('رمز عبور حداقل ۴ کاراکتر باشد', 'error');
                return;
            }

            showMsg('در حال ثبت‌نام...', '');
            const result = await callAPI({ action: 'register', display_name: displayName, username, password });

            if (result.success) {
                showMsg('ثبت‌نام موفق — حالا می‌تونی وارد بشی', 'success');
                document.getElementById('reg-display').value = '';
                document.getElementById('reg-username').value = '';
                document.getElementById('reg-password').value = '';
                tabLogin.click();
            } else {
                showMsg(result.error, 'error');
            }
        });
    </script>
</body>
</html>
