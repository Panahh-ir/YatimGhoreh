<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باغ خاطرات - Card Battle</title>
    <!-- Font Awesome برای آیکون‌ها -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background: url('https://images.unsplash.com/photo-1509803874385-db7c23652552?w=1920') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* لایه تیره برای خوانایی */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            min-height: 100vh;
        }

        /* ========== هدر ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        /* اطلاعات کاربر - بالا چپ */
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 10px 20px;
        }

        .user-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #c9a84c;
            background: url('https://i.pravatar.cc/150?img=12') center/cover;
            flex-shrink: 0;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-name {
            font-size: 16px;
            font-weight: bold;
            color: #f5e6c8;
        }

        .user-level {
            font-size: 12px;
            color: #c9a84c;
        }

        .user-xp-bar {
            width: 100px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-top: 3px;
            overflow: hidden;
        }

        .user-xp-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, #c9a84c, #f5d76e);
            border-radius: 3px;
        }

        /* منابع - بالا وسط */
        .resources {
            display: flex;
            gap: 25px;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 12px 30px;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .resource-item i {
            font-size: 24px;
        }

        .coin i {
            color: #f5d76e;
        }

        .diamond i {
            color: #5dade2;
        }

        .coin span,
        .diamond span {
            color: #fff;
        }

        /* منوی بالا راست */
        .top-menu {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-menu-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ddd;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .top-menu-btn i {
            font-size: 15px;
        }

        .top-menu-btn:hover {
            background: rgba(201, 168, 76, 0.3);
            border-color: #c9a84c;
            color: #f5e6c8;
        }

        /* ========== محتوای اصلی ========== */
        .main-content {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* بخش وسط */
        .center-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* دکمه‌های مبارزه */
        .battle-buttons {
            display: flex;
            gap: 25px;
            margin-top: 40px;
        }

        .battle-btn {
            padding: 22px 55px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .battle-btn i {
            font-size: 26px;
        }

        .btn-fight {
            background: linear-gradient(135deg, #8b1a1a, #c0392b);
            color: #fff;
            box-shadow: 0 8px 30px rgba(192, 57, 43, 0.4);
        }

        .btn-fight:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(255, 60, 40, 0.6);
        }

        .btn-challenge {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            color: #fff;
            box-shadow: 0 8px 30px rgba(41, 128, 185, 0.4);
        }

        .btn-challenge:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(41, 128, 255, 0.6);
        }

        /* گاو صندوق‌ها */
        .chests-section {
            display: flex;
            gap: 25px;
            margin-top: 20px;
        }

        .chest {
            width: 120px;
            height: 140px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #ccc;
        }

        .chest:hover {
            border-color: #c9a84c;
            box-shadow: 0 8px 25px rgba(201, 168, 76, 0.3);
            transform: translateY(-5px);
        }

        .chest i {
            font-size: 45px;
        }

        .chest.wood i {
            color: #b8956a;
        }
        .chest.silver i {
            color: #bdc3c7;
        }
        .chest.gold i {
            color: #f5d76e;
        }

        /* خط داستانی - سمت راست */
        .story-section {
            width: 280px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            align-self: flex-start;
            margin-top: 40px;
        }

        .story-title {
            font-size: 18px;
            color: #f5e6c8;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .story-title i {
            color: #c9a84c;
        }

        .story-icon {
            font-size: 60px;
            color: #c9a84c;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        .story-btn {
            background: linear-gradient(135deg, #6c3483, #8e44ad);
            color: #fff;
            padding: 15px 35px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .story-btn:hover {
            box-shadow: 0 8px 25px rgba(142, 68, 173, 0.5);
            transform: translateY(-2px);
        }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            font-size: 12px;
            color: #aaa;
        }

        .chapter-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chapter-item i {
            color: #c9a84c;
            font-size: 10px;
        }

        .chapter-item:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #f5e6c8;
        }

        /* ذرات معلق */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* رسپانسیو */
        @media (max-width: 900px) {
            .header {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .main-content {
                flex-direction: column;
                align-items: center;
            }
            .story-section {
                width: 100%;
                margin-top: 20px;
            }
            .battle-buttons {
                flex-direction: column;
                gap: 15px;
            }
            .chests-section {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- ذرات معلق -->
    <div class="particles" id="particles"></div>

    <div class="container">

        <!-- ===== هدر ===== -->
        <div class="header">

            <!-- اطلاعات کاربر - بالا چپ -->
            <div class="user-info">
                <div class="user-avatar"></div>
                <div class="user-details">
                    <span class="user-name">امیرمهدی</span>
                    <span class="user-level">سطح ۲۴</span>
                    <div class="user-xp-bar">
                        <div class="user-xp-fill"></div>
                    </div>
                </div>
            </div>

            <!-- سکه و الماس - وسط -->
            <div class="resources">
                <div class="resource-item coin">
                    <i class="fas fa-coins"></i>
                    <span>12,500</span>
                </div>
                <div class="resource-item diamond">
                    <i class="fas fa-gem"></i>
                    <span>340</span>
                </div>
            </div>

            <!-- منو بالا راست -->
            <div class="top-menu">
                <button class="top-menu-btn">
                    <i class="fas fa-cog"></i> تنظیمات
                </button>
                <button class="top-menu-btn">
                    <i class="fas fa-newspaper"></i> اخبار
                </button>
                <button class="top-menu-btn">
                    <i class="fas fa-headset"></i> پشتیبانی
                </button>
            </div>

        </div>

        <!-- ===== محتوای اصلی ===== -->
        <div class="main-content">

            <!-- بخش وسط -->
            <div class="center-section">

                <!-- دکمه‌های مبارزه -->
                <div class="battle-buttons">
                    <button class="battle-btn btn-fight">
                        <i class="fas fa-crosshairs"></i> مبارزه
                    </button>
                    <button class="battle-btn btn-challenge">
                        <i class="fas fa-trophy"></i> چالش
                    </button>
                </div>

                <!-- گاو صندوق‌ها -->
                <div class="chests-section">
                    <div class="chest wood">
                        <i class="fas fa-box"></i>
                        <span>چوبی</span>
                        <span style="font-size:11px;color:#888;">رایگان</span>
                    </div>
                    <div class="chest silver">
                        <i class="fas fa-gift"></i>
                        <span>نقره‌ای</span>
                        <span style="font-size:11px;color:#888;">۵۰۰ <i class="fas fa-coins" style="color:#f5d76e;"></i></span>
                    </div>
                    <div class="chest gold">
                        <i class="fas fa-crown"></i>
                        <span>طلایی</span>
                        <span style="font-size:11px;color:#888;">۵۰ <i class="fas fa-gem" style="color:#5dade2;"></i></span>
                    </div>
                </div>

            </div>

            <!-- خط داستانی - سمت راست -->
            <div class="story-section">
                <span class="story-title">
                    <i class="fas fa-book-open"></i> خط داستانی
                </span>
                <i class="fas fa-scroll story-icon"></i>
                <button class="story-btn">
                    <i class="fas fa-feather-alt"></i> ورود به داستان
                </button>
                <div class="chapter-list">
                    <div class="chapter-item">
                        <i class="fas fa-bookmark"></i> فصل اول: باغ خاطرات
                    </div>
                    <div class="chapter-item">
                        <i class="fas fa-bookmark"></i> فصل دوم: کابوس
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        // ذرات معلق
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 8 + 5 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }

        // رویدادهای کلیک
        document.querySelector('.btn-fight').addEventListener('click', () => {
            alert('بخش مبارزه به زودی...');
        });

        document.querySelector('.btn-challenge').addEventListener('click', () => {
            alert('بخش چالش به زودی...');
        });

        document.querySelector('.story-btn').addEventListener('click', () => {
            alert('در حال انتقال به خط داستانی...');
        });

        // گاو صندوق‌ها
        document.querySelectorAll('.chest').forEach(chest => {
            chest.addEventListener('click', function() {
                const type = this.querySelector('span:first-of-type').textContent;
                alert('باز کردن گاو صندوق ' + type + '...');
            });
        });

        // منوی بالا
        document.querySelectorAll('.top-menu-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                alert('بخش ' + this.textContent.trim() + ' به زودی...');
            });
        });
    </script>

</body>
</html>
