<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>یتیم غوره</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://cdn.imgurl.ir/uploads/m853286_bg-forest.jpg') center center / cover no-repeat fixed;
            filter: blur(6px) brightness(0.35);
            z-index: 0;
        }

        body > * {
            position: relative;
            z-index: 1;
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 40px;
            padding: 8px 18px;
            cursor: pointer;
            z-index: 20;
            font-size: 14px;
            color: #d4af37;
            transition: 0.2s;
            font-family: monospace;
        }
        .music-control i {
            margin-left: 8px;
        }
        .music-control:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: #d4af37;
        }

        .mystic-card {
            background: rgba(10, 8, 12, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 32px 16px 48px 16px;
            padding: 36px 32px 42px;
            width: 460px;
            max-width: 92%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(212,175,55,0.2);
        }

        .game-title {
            text-align: center;
            font-size: 32px;
            font-weight: 300;
            color: #ecd68a;
            text-shadow: 0 0 8px #8a6a1a;
            letter-spacing: 4px;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: #cbb45e;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .input-group label i {
            margin-left: 6px;
            font-size: 12px;
        }

        .mystic-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 12px 18px;
            border-radius: 48px;
            color: #ecd68a;
            font-family: monospace;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .mystic-field:focus {
            border-color: #d4af37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        .gold-btn {
            width: 100%;
            background: linear-gradient(135deg, #2a2418 0%, #0f0c08 100%);
            border: 1px solid #d4af37;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #ecd68a;
            border-radius: 60px;
            cursor: pointer;
            font-family: monospace;
            margin-top: 12px;
            transition: 0.2s;
        }
        .gold-btn i {
            margin-left: 8px;
        }
        .gold-btn:hover {
            background: #3a3020;
            border-color: #f0c850;
            color: #fff0c0;
            box-shadow: 0 0 16px rgba(212, 175, 55, 0.5);
        }

        .toggle-link {
            text-align: center;
            margin-top: 22px;
        }

        .toggle-link span {
            color: #b89a4a;
            font-size: 12px;
            border-bottom: 1px dashed #b89a4a;
            cursor: pointer;
        }
        .toggle-link span i {
            margin-left: 5px;
            font-size: 11px;
        }
        .toggle-link span:hover {
            color: #ecd68a;
        }

        .msg-area {
            background: rgba(0, 0, 0, 0.6);
            border-right: 3px solid #d4af37;
            padding: 8px;
            font-size: 12px;
            color: #ecd68a;
            margin-top: 18px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        hr {
            border-color: #4a3a1a;
            margin: 22px 0 12px;
        }

        .footer-note {
            text-align: center;
            font-size: 9px;
            color: #6a5a3a;
            margin-top: 18px;
        }
        .footer-note i {
            margin: 0 4px;
            font-size: 10px;
        }
    </style>
</head>
<body>

<div class="mystic-card">
    <div class="game-title">یتیم غوره</div>

    <div id="loginSection">
        <div class="input-group">
            <label><i class="fas fa-user"></i> نام کاربری</label>
            <input type="text" id="loginUsername" class="mystic-field" placeholder="نام کاربری">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> رمز عبور</label>
            <input type="password" id="loginPassword" class="mystic-field" placeholder="••••••">
        </div>
        <button id="loginBtn" class="gold-btn"><i class="fas fa-key"></i> وارد شو</button>
        <div class="toggle-link"><span id="showRegBtn"><i class="fas fa-user-plus"></i> ثبت‌نام</span></div>
    </div>

    <div id="registerSection" style="display:none;">
        <div class="input-group">
            <label><i class="fas fa-signature"></i> نام کامل</label>
            <input type="text" id="regFullname" class="mystic-field" placeholder="نام کامل">
        </div>
        <div class="input-group">
            <label><i class="fas fa-user"></i> نام کاربری</label>
            <input type="text" id="regUsername" class="mystic-field" placeholder="نام کاربری">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> رمز عبور</label>
            <input type="password" id="regPassword" class="mystic-field" placeholder="••••••">
        </div>
        <div class="input-group">
            <label><i class="fas fa-image"></i> لینک آواتار</label>
            <input type="text" id="regAvatar" class="mystic-field" placeholder="اختیاری">
        </div>
        <button id="registerBtn" class="gold-btn"><i class="fas fa-check"></i> ثبت نام</button>
        <div class="toggle-link"><span id="backLoginBtn"><i class="fas fa-arrow-right"></i> بازگشت</span></div>
    </div>

    <div id="messageBox" class="msg-area"></div>
    <hr>
    <div class="footer-note">
        <i class="fas fa-dice-d6"></i> بازی داستانی · استراتژیک · کارتی <i class="fas fa-dice-d6"></i>
    </div>
</div>

<div class="music-control" id="musicToggle">
    <i class="fas fa-music"></i> قطع موزیک
</div>

<audio id="bgMusic" src="https://cdn.imgurl.ir/uploads/e852702_bg-music.mp3" loop preload="auto"></audio>

<script>
    (function(){
        const music = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggle');
        let isPlaying = false;

        function playMusic() {
            music.volume = 0.12;
            music.play().then(() => {
                isPlaying = true;
                toggleBtn.innerHTML = '<i class="fas fa-music"></i> قطع موزیک';
            }).catch(e => console.log('عدم مجوز پخش خودکار'));
        }

        function pauseMusic() {
            music.pause();
            isPlaying = false;
            toggleBtn.innerHTML = '<i class="fas fa-music"></i> پخش موزیک';
        }

        toggleBtn.onclick = () => {
            if (isPlaying) pauseMusic();
            else playMusic();
        };

        document.body.addEventListener('click', function firstClick() {
            if (!isPlaying) playMusic();
            document.body.removeEventListener('click', firstClick);
        });

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSE7nL_H2y5PtFG6APuL-98QEBWsN0ENp6PMmKIcxx45PG60B7pXbl6rcxCpCSYI_OHw/exec";

        function showMessage(text, isGood=false){
            let box = document.getElementById('messageBox');
            box.innerText = text;
            box.style.display = 'block';
            box.style.borderRightColor = isGood ? '#d4af37' : '#d44';
            setTimeout(()=>{ box.style.display = 'none'; }, 3200);
        }

        async function callAPI(action, payload){
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...payload })
                });
                const data = await response.json();
                return data;
            } catch(e){
                console.error(e);
                return { ok: false, message: 'خطا در ارتباط با سرور' };
            }
        }

        document.getElementById('registerBtn').onclick = async () => {
            const fullname = document.getElementById('regFullname').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const avatar = document.getElementById('regAvatar').value.trim();

            if(!fullname || !username || !password){
                showMessage('نام کامل، نام کاربری و رمز عبور الزامی است');
                return;
            }

            const res = await callAPI('register', { fullname, username, password, avatar });
            showMessage(res.message, res.ok);
            if(res.ok){
                document.getElementById('backLoginBtn').click();
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = '';
            }
        };

        document.getElementById('loginBtn').onclick = async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if(!username || !password){
                showMessage('نام کاربری و رمز عبور الزامی است');
                return;
            }

            const res = await callAPI('login', { username, password });
            if(res.ok){
                localStorage.setItem('yatim_session', JSON.stringify(res.userData));
                showMessage('ورود موفق', true);
                setTimeout(() => {
                    location.href = 'html/dashboard.html';
                }, 600);
            } else {
                showMessage(res.message);
            }
        };

        document.getElementById('showRegBtn').onclick = () => {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('messageBox').style.display = 'none';
        };
        document.getElementById('backLoginBtn').onclick = () => {
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('messageBox').style.display = 'none';
        };
    })();
</script>
</body>
</html>
