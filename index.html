<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پرتگاه | ورود</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #050105;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(60,0,20,0.3) 0%, #000 90%);
            pointer-events: none;
        }

        .login-box {
            background: rgba(8, 3, 6, 0.9);
            border: 1px solid #6a1a2a;
            border-radius: 16px;
            padding: 32px 28px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 0 30px rgba(100,0,20,0.3);
            position: relative;
            z-index: 2;
        }

        .skull {
            text-align: center;
            font-size: 48px;
            color: #8a2a3a;
            margin-bottom: 16px;
        }

        h2 {
            color: #ba8a6a;
            text-align: center;
            font-size: 22px;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .input-field {
            margin-bottom: 20px;
        }

        .input-field label {
            display: block;
            color: #8a5a4a;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .input-field input {
            width: 100%;
            background: #0a0208;
            border: 1px solid #4a1a2a;
            padding: 10px 14px;
            color: #caaa8a;
            border-radius: 8px;
            font-family: monospace;
            outline: none;
        }

        .input-field input:focus {
            border-color: #a22;
            box-shadow: 0 0 6px #a22;
        }

        button {
            width: 100%;
            background: #1a0a10;
            border: 1px solid #7a2a3a;
            padding: 10px;
            color: #ca9a7a;
            font-family: monospace;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 8px;
        }

        button:hover {
            background: #2a1018;
            border-color: #c44;
            color: #eebb99;
        }

        .switch {
            text-align: center;
            margin-top: 20px;
        }

        .switch span {
            color: #6a4a3a;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 1px dashed #6a4a3a;
        }

        .switch span:hover {
            color: #ca8a6a;
        }

        .msg {
            margin-top: 16px;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            background: #1a0508;
            border-right: 3px solid #a33;
            color: #da9a7a;
            display: none;
        }

        hr {
            border-color: #3a1a1a;
            margin: 16px 0 8px;
        }

        .footer {
            text-align: center;
            font-size: 9px;
            color: #3a1a1a;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="skull">💀</div>
    <h2>معبد سایه‌ها</h2>

    <div id="loginPanel">
        <div class="input-field">
            <label>نام کاربری</label>
            <input type="text" id="loginUser" placeholder="shadow_hunter">
        </div>
        <div class="input-field">
            <label>رمز عبور</label>
            <input type="password" id="loginPass" placeholder="••••••">
        </div>
        <button id="doLogin">ورود به پرتگاه</button>
        <div class="switch"><span id="showReg">ثبت‌نام کن</span></div>
    </div>

    <div id="regPanel" style="display:none;">
        <div class="input-field">
            <label>نام کامل</label>
            <input type="text" id="regFull" placeholder="امیر مهدی">
        </div>
        <div class="input-field">
            <label>نام کاربری</label>
            <input type="text" id="regUser" placeholder="amir_mahdi">
        </div>
        <div class="input-field">
            <label>رمز عبور</label>
            <input type="password" id="regPass" placeholder="••••••">
        </div>
        <div class="input-field">
            <label>لینک آواتار</label>
            <input type="text" id="regAvatar" placeholder="https://...">
        </div>
        <button id="doReg">ثبت نام</button>
        <div class="switch"><span id="backLogin">بازگشت به ورود</span></div>
    </div>

    <div id="msgBox" class="msg"></div>
    <hr>
    <div class="footer">⚔️ بازی کارتی - استراتژیک ⚔️</div>
</div>

<script>
    (function(){
        let useMock = true;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_DUMMY/exec";

        function showMsg(text, isError=true){
            let box = document.getElementById('msgBox');
            box.innerText = text;
            box.style.display = 'block';
            box.style.borderRightColor = isError ? '#d44' : '#2a8';
            setTimeout(()=>{ box.style.display = 'none'; }, 3000);
        }

        // mock backend
        async function apiCall(action, data){
            if(useMock){
                let users = JSON.parse(localStorage.getItem('SHADOW_USERS') || '[]');
                if(action === 'register'){
                    let exist = users.find(u=>u.username === data.username);
                    if(exist) return {ok:false, msg:'نام کاربری تکراری'};
                    let newUser = {
                        fullname: data.fullname,
                        username: data.username,
                        password: data.password,
                        avatar: data.avatar || '',
                        level: 1,
                        coins: 200,
                        gems: 10,
                        hero1: 'Raven',
                        hero1_lv:1,
                        hero2:'Wolf',
                        hero2_lv:1,
                        hero3:'Shadow',
                        hero3_lv:1
                    };
                    users.push(newUser);
                    localStorage.setItem('SHADOW_USERS', JSON.stringify(users));
                    return {ok:true, msg:'ثبت شد. وارد شوید'};
                }
                if(action === 'login'){
                    let user = users.find(u=>u.username === data.username && u.password === data.password);
                    if(!user) return {ok:false, msg:'نام یا رمز اشتباه'};
                    let session = {
                        username: user.username,
                        fullname: user.fullname,
                        avatar: user.avatar,
                        level: user.level,
                        coins: user.coins,
                        gems: user.gems
                    };
                    localStorage.setItem('ACTIVE_SESSION', JSON.stringify(session));
                    return {ok:true, redirect:'html/dashboard.html'};
                }
            }
            return {ok:false, msg:'خطا در ارتباط'};
        }

        document.getElementById('doLogin').onclick = async ()=>{
            let user = document.getElementById('loginUser').value.trim();
            let pass = document.getElementById('loginPass').value.trim();
            if(!user || !pass){
                showMsg('پر کردن هر دو فیلد الزامی است');
                return;
            }
            let res = await apiCall('login', {username:user, password:pass});
            if(res.ok){
                if(res.redirect) location.href = res.redirect;
                else location.href = 'html/dashboard.html';
            } else {
                showMsg(res.msg);
            }
        };

        document.getElementById('doReg').onclick = async ()=>{
            let full = document.getElementById('regFull').value.trim();
            let user = document.getElementById('regUser').value.trim();
            let pass = document.getElementById('regPass').value.trim();
            let avatar = document.getElementById('regAvatar').value.trim();
            if(!full || !user || !pass){
                showMsg('نام کامل، نام کاربری و رمز الزامیست');
                return;
            }
            let res = await apiCall('register', {fullname:full, username:user, password:pass, avatar:avatar});
            showMsg(res.msg, res.ok);
            if(res.ok){
                document.getElementById('showReg').click();
                document.getElementById('loginUser').value = user;
                document.getElementById('loginPass').value = '';
            }
        };

        document.getElementById('showReg').onclick = ()=>{
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('regPanel').style.display = 'block';
            document.getElementById('msgBox').style.display = 'none';
        };
        document.getElementById('backLogin').onclick = ()=>{
            document.getElementById('regPanel').style.display = 'none';
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('msgBox').style.display = 'none';
        };
    })();
</script>
</body>
</html>
